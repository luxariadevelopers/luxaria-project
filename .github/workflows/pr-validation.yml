# Required status check for branch protection: "PR gate"
# Repo → Settings → Branches → require this check before merge.

name: PR Validation

on:
  pull_request:
  push:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  CI: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Typecheck workspace
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Lint workspace
        run: pnpm lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Backend + mobile unit tests
        run: pnpm test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Backend integration tests
        run: pnpm test:integration

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Backend API / e2e tests
        run: pnpm test:api

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Build NestJS backend
        run: pnpm --filter @luxaria/backend build

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Build Vite web
        run: pnpm --filter @luxaria/web build
        env:
          VITE_API_BASE_URL: /api/v1

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Production dependency audit
        run: pnpm audit --prod --audit-level=high
      - name: Backend security tests
        run: pnpm --filter @luxaria/backend test:security

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile.dev
          push: false
          tags: luxaria-backend-dev:ci
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,mode=max,scope=backend-dev

      - name: Build web (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile.dev
          push: false
          tags: luxaria-web-dev:ci
          cache-from: type=gha,scope=web-dev
          cache-to: type=gha,mode=max,scope=web-dev

      - name: Build web (production)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: luxaria-web:ci
          cache-from: type=gha,scope=web-prod
          cache-to: type=gha,mode=max,scope=web-prod

      - name: Build backend (production)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: luxaria-backend:ci
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,mode=max,scope=backend-prod

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      E2E_LIVE_API: 'true'
      E2E_API_BASE_URL: http://127.0.0.1:9000/api/v1
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:9001
      VITE_PROXY_TARGET: http://127.0.0.1:9000
      E2E_ADMIN_IDENTIFIER: e2e-admin@luxaria.test
      E2E_ADMIN_PASSWORD: E2eAdminPass123!
      E2E_ADMIN_FULL_NAME: E2E Admin
      E2E_ADMIN_MOBILE: '9000000001'
      E2E_LIMITED_IDENTIFIER: e2e-limited@luxaria.test
      E2E_LIMITED_PASSWORD: E2eLimitedPass123!
      E2E_LIMITED_FULL_NAME: E2E Limited User
      E2E_LIMITED_MOBILE: '9000000002'
      E2E_PROJECT_NAME: E2E Smoke Project
      E2E_LIMITED_ROLE_CODE: E2E_DASHBOARD_ONLY
      NODE_ENV: test
      PORT: '9000'
      APP_NAME: Luxaria Developers ERP API
      APP_VERSION: 0.1.0
      MONGODB_URI: mongodb://127.0.0.1:27017/luxaria-e2e-ci
      CORS_ORIGINS: http://127.0.0.1:9001
      SWAGGER_ENABLED: 'false'
      LOG_LEVEL: error
      JWT_ACCESS_SECRET: luxaria-e2e-ci-access-secret-32chars!!
      JWT_REFRESH_SECRET: luxaria-e2e-ci-refresh-secret-32chars!
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      AUTH_MAX_FAILED_ATTEMPTS: '5'
      AUTH_LOCK_MINUTES: '30'
      FIELD_ENCRYPTION_KEY: luxaria-e2e-field-encryption-key-32b
      REDIS_ENABLED: 'false'
      STOCK_REORDER_JOBS_ENABLED: 'false'
      DPR_MISSING_JOBS_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Build NestJS backend
        run: pnpm --filter @luxaria/backend build
      - name: Start API for Playwright
        run: |
          pnpm --filter @luxaria/backend start > /tmp/luxaria-e2e-api.log 2>&1 &
          echo $! > /tmp/luxaria-e2e-api.pid
      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9000/api/v1/health >/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to become healthy"
          tail -n 200 /tmp/luxaria-e2e-api.log || true
          exit 1
      - name: Install Playwright browser
        run: pnpm --filter @luxaria/web test:e2e:install
      - name: Run Playwright E2E
        run: pnpm --filter @luxaria/web test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          if-no-files-found: ignore
      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/luxaria-e2e-api.pid ]; then
            kill "$(cat /tmp/luxaria-e2e-api.pid)" || true
          fi

  # Single required check for branch protection — blocks merge if any job failed.
  pr-gate:
    name: PR gate
    if: always()
    needs:
      - typecheck
      - lint
      - unit-tests
      - integration-tests
      - api-tests
      - build-backend
      - build-web
      - playwright-e2e
      - security-audit
      - docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Enforce green required jobs
        env:
          TYPECHECK: ${{ needs.typecheck.result }}
          LINT: ${{ needs.lint.result }}
          UNIT: ${{ needs.unit-tests.result }}
          INTEGRATION: ${{ needs.integration-tests.result }}
          API: ${{ needs.api-tests.result }}
          BUILD_BACKEND: ${{ needs.build-backend.result }}
          BUILD_WEB: ${{ needs.build-web.result }}
          PLAYWRIGHT: ${{ needs.playwright-e2e.result }}
          SECURITY: ${{ needs.security-audit.result }}
          DOCKER: ${{ needs.docker-build.result }}
        run: |
          failed=0
          for name in TYPECHECK LINT UNIT INTEGRATION API BUILD_BACKEND BUILD_WEB PLAYWRIGHT SECURITY DOCKER; do
            result="${!name}"
            echo "$name=$result"
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::PR Validation failed. Fix failing jobs before merge."
            exit 1
          fi
          echo "All required PR Validation jobs passed."
