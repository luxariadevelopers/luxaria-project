# Required status check for branch protection: "PR gate"
# Repo → Settings → Branches → require this check before merge.

name: PR Validation

on:
  pull_request:
  push:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  CI: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Typecheck workspace
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Lint workspace
        run: pnpm lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Backend + mobile unit tests
        run: pnpm test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Backend integration tests
        run: pnpm test:integration

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Backend API / e2e tests
        run: pnpm test:api

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Build NestJS backend
        run: pnpm --filter @luxaria/backend build

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Build Vite web
        run: pnpm --filter @luxaria/web build
        env:
          VITE_API_BASE_URL: /api/v1

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Production dependency audit
        run: pnpm audit --prod --audit-level=high
      - name: Backend security tests
        run: pnpm --filter @luxaria/backend test:security

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend (dev)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/backend/Dockerfile.dev
          push: false
          tags: luxaria-backend-dev:ci
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,mode=max,scope=backend-dev

      - name: Build web (dev)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile.dev
          push: false
          tags: luxaria-web-dev:ci
          cache-from: type=gha,scope=web-dev
          cache-to: type=gha,mode=max,scope=web-dev

      - name: Build web (production)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: luxaria-web:ci
          cache-from: type=gha,scope=web-prod
          cache-to: type=gha,mode=max,scope=web-prod

      - name: Build backend (production)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: luxaria-backend:ci
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,mode=max,scope=backend-prod

  # Single required check for branch protection — blocks merge if any job failed.
  pr-gate:
    name: PR gate
    if: always()
    needs:
      - typecheck
      - lint
      - unit-tests
      - integration-tests
      - api-tests
      - build-backend
      - build-web
      - security-audit
      - docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Enforce green required jobs
        env:
          TYPECHECK: ${{ needs.typecheck.result }}
          LINT: ${{ needs.lint.result }}
          UNIT: ${{ needs.unit-tests.result }}
          INTEGRATION: ${{ needs.integration-tests.result }}
          API: ${{ needs.api-tests.result }}
          BUILD_BACKEND: ${{ needs.build-backend.result }}
          BUILD_WEB: ${{ needs.build-web.result }}
          SECURITY: ${{ needs.security-audit.result }}
          DOCKER: ${{ needs.docker-build.result }}
        run: |
          failed=0
          for name in TYPECHECK LINT UNIT INTEGRATION API BUILD_BACKEND BUILD_WEB SECURITY DOCKER; do
            result="${!name}"
            echo "$name=$result"
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::PR Validation failed. Fix failing jobs before merge."
            exit 1
          fi
          echo "All required PR Validation jobs passed."
