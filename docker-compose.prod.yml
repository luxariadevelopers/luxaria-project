# Production stack (non-root app images, no bind mounts).
# Uses live MongoDB Atlas via MONGODB_URI in .env.docker.
#   cp .env.docker.example .env.docker   # set real secrets + Atlas URI
#   docker compose -f docker-compose.prod.yml --env-file .env.docker up -d --build

name: luxaria-prod

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - luxaria_prod_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 9000
      REDIS_ENABLED: 'true'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      SWAGGER_ENABLED: 'false'
      AUTH_COOKIE_SECURE: 'true'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:9000/api/v1/health']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    ports:
      - '9001:8080'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  luxaria_prod_redis:
